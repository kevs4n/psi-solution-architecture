  // ═══════════════════════════════════════════════════════════════
  // TAB 4: PROCESS FLOWS
  // ═══════════════════════════════════════════════════════════════

  // ── Freja-quality swimlane renderer (ported from rfp-freja) ──
  const SL = {
    stepW: 150, stepH: 60, decisionS: 60, hGap: 195, vPad: 55,
    laneHeaderW: 110, contentStartX: 105, cornerR: 6, wrapChars: 18, hdrWrapChars: 12,
    laneColors: {
      role:   { bg: '#ffffff', text: '#2d2d3a', border: '#e5e7eb' },
      system: { bg: '#eff6ff', text: '#2563eb', border: '#dbeafe' },
      ext:    { bg: '#f5f3ff', text: '#7c3aed', border: '#e9d5ff' },
      boundary:{ bg: '#fffbeb', text: '#92400e', border: '#fde68a' }
    },
    connStroke: '#8b95a5', numBg: '#1e3a5f',
    stepFill: '#ffffff', stepStroke: '#e5e7eb',
    decisionFill: '#fdf4e7', decisionStroke: '#E1A143'
  };

  function slWrapLabel(text, maxChars) {
    if (text.length <= maxChars) return [text];
    const sp = text.lastIndexOf(' ', maxChars);
    if (sp > 0) return [text.slice(0, sp), text.slice(sp + 1)];
    return [text.slice(0, maxChars), text.slice(maxChars)];
  }

  function getScopedL2Areas() {
    const result = [];
    CONFIG.bpc.forEach(l1 => {
      l1.areas.forEach(l2 => {
        const scoped = l2.processes.filter(l3 => {
          const s = state.bpcScope[l3.id];
          return s === 'in-scope' || s === 'future';
        });
        if (scoped.length > 0) result.push({ l1, l2, scopedProcesses: scoped });
      });
    });
    return result;
  }

  // Map BPC products to lane roles
  function deriveLanes(processes) {
    const productSets = {};
    processes.forEach(p => {
      (p.products || []).forEach(prod => {
        const sys = CONFIG.productSystemMap[prod];
        if (sys === 'd365fo') productSets['D365 Finance'] = 'system';
        else if (sys === 'd365ce') productSets['D365 CE'] = 'system';
        else if (sys === 'power') productSets['Power Platform'] = 'system';
      });
    });
    const lanes = [{ id: 'user', name: 'Business User', type: 'role' }];
    Object.entries(productSets).forEach(([name, type], i) => {
      lanes.push({ id: `sys${i}`, name, type });
    });
    if (lanes.length === 1) lanes.push({ id: 'sys0', name: 'D365 Finance', type: 'system' });
    return lanes;
  }

  function generateProcessFlow(l2Id, l2Name, processes) {
    const lanes = deriveLanes(processes);
    const sysLane = lanes.find(l => l.type === 'system') || lanes[1];
    const steps = [];
    const connections = [];

    processes.forEach((p, i) => {
      // Alternate between user and system lane for realistic flow
      const isSystemStep = i % 2 === 1;
      const lane = isSystemStep ? sysLane.id : 'user';
      steps.push({
        id: `s${i + 1}`, lane, col: i, num: i + 1,
        label: p.name,
        data: p.id,
        type: undefined // regular step
      });
    });

    // Sequential connections
    for (let i = 0; i < steps.length - 1; i++) {
      connections.push({ from: steps[i].id, to: steps[i + 1].id });
    }

    return { title: `${l2Id} ${l2Name}`, lanes, steps, connections };
  }

  function renderFlowSVG(flow, uniqueId) {
    const lanes = flow.lanes, steps = flow.steps, conns = flow.connections || [];
    const laneH = SL.stepH + SL.vPad * 2;
    const totalH = lanes.length * laneH;
    const maxCol = Math.max(...steps.map(s => s.col), 0) + 1;
    const bodyW = SL.contentStartX + maxCol * SL.hGap + 60;
    const totalW = SL.laneHeaderW + bodyW;

    const laneIndex = {};
    lanes.forEach((l, i) => { laneIndex[l.id] = i; });
    const boxPos = {};
    steps.forEach(s => {
      const li = laneIndex[s.lane] || 0;
      const x = SL.laneHeaderW + SL.contentStartX + s.col * SL.hGap;
      const y = li * laneH + (laneH - SL.stepH) / 2;
      const w = s.type === 'decision' ? SL.decisionS : SL.stepW;
      boxPos[s.id] = { x, y, w, h: SL.stepH, laneIdx: li };
    });

    const mid = `fl-${uniqueId}`;
    let svg = `<svg width="${totalW}" height="${totalH}" xmlns="http://www.w3.org/2000/svg" style="display:block;font-family:'Segoe UI',system-ui,sans-serif;background:#fafbfc">`;
    svg += `<defs><marker id="ah-${mid}" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="${SL.connStroke}"/></marker></defs>`;

    // Lane headers + backgrounds
    lanes.forEach((lane, i) => {
      const col = SL.laneColors[lane.type] || SL.laneColors.role;
      const y = i * laneH;
      // Full row bg
      svg += `<rect x="${SL.laneHeaderW}" y="${y}" width="${bodyW}" height="${laneH}" fill="${col.bg}" stroke="${col.border}" stroke-width="0.5"/>`;
      // Header cell
      svg += `<rect x="0" y="${y}" width="${SL.laneHeaderW}" height="${laneH}" fill="${col.bg}" stroke="${col.border}" stroke-width="1"/>`;
      // Header text
      const lines = slWrapLabel(lane.name, SL.hdrWrapChars);
      if (lines.length === 1) {
        svg += `<text x="${SL.laneHeaderW/2}" y="${y + laneH/2}" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="${col.text}">${lines[0]}</text>`;
      } else {
        svg += `<text x="${SL.laneHeaderW/2}" y="${y + laneH/2 - 7}" text-anchor="middle" font-size="11" font-weight="700" fill="${col.text}"><tspan x="${SL.laneHeaderW/2}" dy="0">${lines[0]}</tspan><tspan x="${SL.laneHeaderW/2}" dy="1.2em">${lines[1]}</tspan></text>`;
      }
    });

    // Connections
    conns.forEach(c => {
      const fb = boxPos[c.from], tb = boxPos[c.to];
      if (!fb || !tb) return;
      let s, e, path;
      if (fb.laneIdx === tb.laneIdx) {
        s = { x: fb.x + fb.w, y: fb.y + fb.h / 2 };
        e = { x: tb.x, y: tb.y + tb.h / 2 };
        path = `M${s.x},${s.y} L${e.x},${e.y}`;
      } else {
        const goDown = tb.laneIdx > fb.laneIdx;
        s = { x: fb.x + fb.w / 2, y: goDown ? fb.y + fb.h : fb.y };
        e = { x: tb.x, y: tb.y + tb.h / 2 };
        const r = SL.cornerR;
        path = `M${s.x},${s.y} L${s.x},${e.y + (goDown ? -r : r)} Q${s.x},${e.y} ${s.x + r},${e.y} L${e.x},${e.y}`;
      }
      svg += `<path d="${path}" fill="none" stroke="${SL.connStroke}" stroke-width="1.5" marker-end="url(#ah-${mid})"/>`;
      if (c.label) {
        const mx = (fb.x + fb.w / 2 + tb.x) / 2;
        const my = (fb.y + fb.h / 2 + tb.y + tb.h / 2) / 2;
        svg += `<rect x="${mx-25}" y="${my-8}" width="50" height="16" rx="8" fill="#fff" stroke="${SL.connStroke}" stroke-width="0.5"/>`;
        svg += `<text x="${mx}" y="${my+3}" text-anchor="middle" font-size="9" fill="${SL.connStroke}">${c.label}</text>`;
      }
    });

    // Steps
    steps.forEach(s => {
      const bp = boxPos[s.id];
      if (!bp) return;
      if (s.type === 'decision') {
        const cx = bp.x + bp.w/2, cy = bp.y + bp.h/2, hw = bp.w/2, hh = bp.h/2;
        svg += `<polygon points="${cx},${cy-hh} ${cx+hw},${cy} ${cx},${cy+hh} ${cx-hw},${cy}" fill="${SL.decisionFill}" stroke="${SL.decisionStroke}" stroke-width="1.5"/>`;
        const lines = slWrapLabel(s.label, SL.wrapChars);
        svg += `<text x="${cx}" y="${cy+3}" text-anchor="middle" font-size="10" font-weight="500" fill="#92400e">${lines[0]}</text>`;
      } else {
        svg += `<rect x="${bp.x}" y="${bp.y}" width="${bp.w}" height="${bp.h}" rx="8" fill="${SL.stepFill}" stroke="${SL.stepStroke}" stroke-width="1"/>`;
        if (s.num) {
          svg += `<circle cx="${bp.x+14}" cy="${bp.y+14}" r="9" fill="${SL.numBg}"/>`;
          svg += `<text x="${bp.x+14}" y="${bp.y+17}" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">${s.num}</text>`;
        }
        const lines = slWrapLabel(s.label, SL.wrapChars);
        const labelX = bp.x + bp.w/2;
        const labelY = s.data ? bp.y + 28 : bp.y + bp.h/2 + 3;
        if (lines.length === 1) {
          svg += `<text x="${labelX}" y="${labelY}" text-anchor="middle" font-size="11" font-weight="500" fill="#2d2d3a">${lines[0]}</text>`;
        } else {
          svg += `<text x="${labelX}" y="${labelY-6}" text-anchor="middle" font-size="11" font-weight="500" fill="#2d2d3a"><tspan x="${labelX}" dy="0">${lines[0]}</tspan><tspan x="${labelX}" dy="1.1em">${lines[1]}</tspan></text>`;
        }
        if (s.data) {
          const dy = lines.length > 1 ? bp.y + bp.h - 8 : bp.y + bp.h - 12;
          svg += `<text x="${labelX}" y="${dy}" text-anchor="middle" font-size="9" font-style="italic" fill="${SL.connStroke}">${s.data}</text>`;
        }
      }
    });

    svg += '</svg>';
    return svg;
  }

  // ── Render Tab 4 ──
  function renderProcessFlows() {
    const container = $('#flowsContainer');
    container.innerHTML = '';
    const areas = getScopedL2Areas();

    if (areas.length === 0) {
      container.innerHTML = '<div class="flows-empty"><strong>No processes scoped yet.</strong><br>Scope processes in the BPC tab to see process flow cards here.</div>';
      $('#flowsSummary').textContent = '';
      return;
    }

    let needsSave = false;
    const flowCount = Object.keys(state.processFlows).filter(k => areas.some(a => a.l2.id === k)).length;
    $('#flowsSummary').textContent = `${flowCount} of ${areas.length} flows generated`;

    areas.forEach(({ l1, l2, scopedProcesses }) => {
      // Auto-generate if no flow exists yet
      if (!state.processFlows[l2.id]) {
        state.processFlows[l2.id] = generateProcessFlow(l2.id, l2.name, scopedProcesses);
        needsSave = true;
      }

      const card = document.createElement('div');
      card.className = 'flow-card';
      card.dataset.l2Id = l2.id;

      // Header
      const header = document.createElement('div');
      header.className = 'flow-card-header';
      header.innerHTML = `
        <span class="flow-l1-crumb">${l1.name} \u203A</span>
        <span class="flow-l2-id">${l2.id}</span>
        <span class="flow-l2-name">${l2.name}</span>
        <span class="flow-scope-count">${scopedProcesses.length} processes</span>
      `;
      card.appendChild(header);

      // Body
      const body = document.createElement('div');
      body.className = 'flow-card-body';

      const existingFlow = state.processFlows[l2.id];

      if (existingFlow) {
        // Check if stale (process count mismatch)
        const stale = existingFlow.steps.length !== scopedProcesses.length;
        // SVG preview
        const svgContainer = document.createElement('div');
        svgContainer.className = 'flow-svg-container';
        svgContainer.innerHTML = renderFlowSVG(existingFlow, l2.id.replace(/\./g, '-'));
        body.appendChild(svgContainer);
        // Actions
        const actions = document.createElement('div');
        actions.className = 'flow-card-actions';
        actions.innerHTML = `
          <button class="flow-btn-open" data-action="open">Open in Process Map (WIP)</button>
          <button data-action="import">Import</button>
          <button data-action="regen">Regenerate</button>
          <button class="flow-btn-remove" data-action="remove">Remove</button>
          ${stale ? '<span class="flow-regen-hint">\u26A0 Scope changed since generation</span>' : ''}
        `;
        actions.querySelectorAll('button').forEach(btn => {
          btn.addEventListener('click', () => handleFlowAction(btn.dataset.action, l2.id, l2.name, scopedProcesses));
        });
        body.appendChild(actions);
      } else {
        body.innerHTML = `<div class="flow-generate-prompt">No process flow defined for this area.<br><button data-action="generate">Generate Flow</button></div>`;
        body.querySelector('button').addEventListener('click', () => {
          state.processFlows[l2.id] = generateProcessFlow(l2.id, l2.name, scopedProcesses);
          state.flowsDirty = true;
          renderProcessFlows();
          saveState();
        });
      }

      card.appendChild(body);
      container.appendChild(card);
    });
    if (needsSave) saveState();
  }

  function handleFlowAction(action, l2Id, l2Name, scopedProcesses) {
    switch (action) {
      case 'open': {
        const json = JSON.stringify(state.processFlows[l2Id], null, 2);
        navigator.clipboard.writeText(json).then(() => {
          showPersistBanner('JSON copied \u2014 paste in Process Map');
        }).catch(() => {
          showPersistBanner('Open Process Map and import the JSON');
        });
        window.open('https://calm-rock-09b727d03.7.azurestaticapps.net', '_blank');
        break;
      }
      case 'import': {
        const input = $('#flowImportFile');
        input.dataset.targetL2 = l2Id;
        input.click();
        break;
      }
      case 'regen':
        state.processFlows[l2Id] = generateProcessFlow(l2Id, l2Name, scopedProcesses);
        state.flowsDirty = true;
        renderProcessFlows();
        saveState();
        break;
      case 'remove':
        delete state.processFlows[l2Id];
        state.flowsDirty = true;
        renderProcessFlows();
        saveState();
        break;
    }
  }

  // Flow import file handler
  $('#flowImportFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const l2Id = e.target.dataset.targetL2;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (!data.lanes || !data.steps || !data.connections) throw new Error('Missing lanes/steps/connections');
        state.processFlows[l2Id] = data;
        state.flowsDirty = true;
        renderProcessFlows();
        saveState();
        showPersistBanner('Flow imported');
      } catch (err) {
        alert('Invalid process flow JSON: ' + err.message);
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  // Generate All / Clear All
  $('#flowsGenerateAll').addEventListener('click', () => {
    getScopedL2Areas().forEach(({ l2, scopedProcesses }) => {
      if (!state.processFlows[l2.id]) {
        state.processFlows[l2.id] = generateProcessFlow(l2.id, l2.name, scopedProcesses);
      }
    });
    state.flowsDirty = true;
    renderProcessFlows();
    saveState();
  });
  $('#flowsClearAll').addEventListener('click', () => {
    state.processFlows = {};
    state.flowsDirty = true;
    renderProcessFlows();
    saveState();
  });

  // ═══════════════════════════════════════════════════════════════
  // PERSISTENCE — localStorage save/restore
  // ═══════════════════════════════════════════════════════════════
  function saveState() {
    try {
      const componentStatuses = {};
      CONFIG.layers.forEach(layer => {
        layer.groups.forEach(group => {
          const save = (comp) => { componentStatuses[comp.id] = comp.status || 'in-scope'; };
          if (group.components) group.components.forEach(save);
          if (group.children) group.children.forEach(sub => sub.components.forEach(save));
        });
      });
      localStorage.setItem('psi-sa-state', JSON.stringify({
        bpcScope: state.bpcScope,
        componentStatuses,
        processFlows: state.processFlows
      }));
      showPersistBanner('State saved');
    } catch (e) { /* quota exceeded */ }
  }

  function showPersistBanner(msg) {
    const banner = $('#persistBanner');
    if (!banner) return;
    banner.textContent = msg || 'State saved';
    banner.classList.add('visible');
    clearTimeout(banner._hideTimer);
    banner._hideTimer = setTimeout(() => banner.classList.remove('visible'), 1200);
  }

  // ═══════════════════════════════════════════════════════════════
  // IMPORT — Load scope from exported JSON
  // ═══════════════════════════════════════════════════════════════
  $('#importScope').addEventListener('click', () => { $('#importFile').click(); });

  $('#importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (data.bpcScope) {
          Object.keys(data.bpcScope).forEach(k => {
            if (state.bpcScope.hasOwnProperty(k)) state.bpcScope[k] = data.bpcScope[k];
          });
        }
        if (data.components) {
          const statusMap = {};
          data.components.forEach(c => { statusMap[c.id] = c.status; });
          CONFIG.layers.forEach(layer => {
            layer.groups.forEach(group => {
              const apply = (comp) => { if (statusMap[comp.id]) comp.status = statusMap[comp.id]; };
              if (group.components) group.components.forEach(apply);
              if (group.children) group.children.forEach(sub => sub.components.forEach(apply));
            });
          });
        }
        if (data.processFlows) {
          Object.assign(state.processFlows, data.processFlows);
        }
        // Re-render
        $('#layersStack').innerHTML = '';
        renderLayers();
        renderSummary();
        renderBpcTree();
        updateBpcSummary();
        state.scopedDirty = true;
        state.flowsDirty = true;
        saveState();
        showPersistBanner('Scope imported');
      } catch (err) {
        alert('Invalid scope file: ' + err.message);
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  // ═══════════════════════════════════════════════════════════════
  // KEYBOARD SHORTCUTS
  // ═══════════════════════════════════════════════════════════════
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    // Alt+1/2/3 for tab switching
    if (e.altKey && (e.key === '1' || e.key === '2' || e.key === '3' || e.key === '4')) {
      e.preventDefault();
      const tabs = ['tab-sa', 'tab-bpc', 'tab-scoped', 'tab-flows'];
      const btn = document.querySelector(`[data-tab="${tabs[parseInt(e.key) - 1]}"]`);
      if (btn) btn.click();
    }
  });

  // ═══════════════════════════════════════════════════════════════
  // INITIALIZE
  // ═══════════════════════════════════════════════════════════════
  function init() {
    renderHeader();
    renderFilters();
    renderSummary();
    renderSidebar('left', '#sidebarLeft');
    renderSidebar('right', '#sidebarRight');
    renderLayers();
    renderBpcTree();
    updateBpcSummary();
  }

  init();

})();
</script>
</body>
</html>
